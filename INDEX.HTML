<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>كتالوج الكيك</title>

  <!-- مكتبة تقليب الصفحات -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4/turn.min.js"></script>

  <style>
    body {
      background: #f2f2f2;
      font-family: "Tahoma", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    #catalog {
      width: 900px;
      height: 600px;
    }

    .page {
      width: 100%;
      height: 100%;
      background: white;
      padding: 20px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .page img {
      width: 85%;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      margin-bottom: 15px;
    }

    h2, h3 {
      margin: 10px 0;
    }

    .price {
      font-size: 22px;
      color: #b22222;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div id="catalog">
  <!-- صفحة الغلاف -->
  <div class="page">
    <h2>كتالوج الكيك</h2>
    <p>تشكيلة فاخرة من الكيك</p>
  </div>

  <!-- صفحة 1 -->
  <div class="page">
    <img src="./img/تارت 3.jpg" alt="كيك شوكولاتة">
    <h3>كيك شوكولاتة</h3>
    <div class="price">45 ريال</div>
  </div>

  <!-- صفحة 2 -->
  <div class="page">
    <img src="./img/تارت2.jpg" alt="كيك فراولة">
    <h3>كيك فراولة</h3>
    <div class="price">55 ريال</div>
  </div>

  <!-- صفحة 3 -->
  <div class="page">
    <img src="./img/ترافيل توت.jpg" alt="كيك فانيلا">
    <h3>كيك فانيلا</h3>
    <div class="price">40 ريال</div>
  </div>

  <!-- صفحة 4 -->
  <div class="page">
    <img src="./img/توسن الزعتر.jpg" alt="كيك لوتس">
    <h3>كيك لوتس</h3>
    <div class="price">60 ريال</div>
  </div>
</div>

<script>
  // تفعيل التقليب
  $("#catalog").turn({
    width: 900,
    height: 600,
    autoCenter: true,
    gradients: true,
    duration: 1200
  });
</script>

</body>
</html>
